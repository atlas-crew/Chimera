name: Release vuln-api-hp

on:
  push:
    tags: ["chimera-api-hp-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vuln-api-hp
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/vuln-api-hp

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/chimera-api-hp-v}"
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag chimera-api-hp-v$tag does not match Cargo.toml version $version"
            exit 1
          fi

      - name: Run tests
        run: cargo test --release

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary runs
        run: |
          ./target/release/chimera-api-hp &
          PID=$!
          sleep 2
          curl -sf http://localhost:8890/healthz
          kill $PID

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    defaults:
      run:
        working-directory: apps/vuln-api-hp
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/vuln-api-hp

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-docker:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nickcrew/chimera-api-hp
          tags: |
            type=match,pattern=chimera-api-hp-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=chimera-api-hp-v(\d+\.\d+),group=1
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/vuln-api-hp
          file: apps/vuln-api-hp/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vuln-api-hp
          cache-to: type=gha,mode=max,scope=vuln-api-hp

  github-release:
    name: GitHub Release
    needs: [publish-crate, publish-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: chimera-api-hp ${{ github.ref_name }}
